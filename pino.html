<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowSnap - Virtual Photobox Merah Putih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --pure-white: #ffffff;
            --soft-gray: #f8f9fa;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--soft-gray);
            color: #1a1a1a;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #e63946 0%, #b91c1c 100%);
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 8px solid var(--pure-white);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .shutter-btn {
            background: var(--primary-red);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .shutter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        .shutter-btn:active {
            transform: scale(0.95);
        }

        .strip-preview {
            background: var(--pure-white);
            padding: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: fit-content;
            margin: 0 auto;
        }

        .strip-photo {
            width: 180px;
            height: 135px;
            object-fit: cover;
            background: #eee;
        }

        .filter-active {
            border: 3px solid var(--primary-red) !important;
        }

        /* Flash Effect */
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .animate-flash {
            animation: flashAnim 0.5s ease-out;
        }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 40;
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="hero-gradient text-white py-8 px-6 text-center shadow-lg">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-2">GLOW<span class="text-red-200">SNAP</span></h1>
        <p class="text-red-50 font-light tracking-widest uppercase text-sm">Edisi Merah Putih • Studio Kualitas Premium</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12 grid grid-cols-1 lg:grid-cols-12 gap-12">
        
        <!-- Area Kamera -->
        <div class="lg:col-span-7 flex flex-col items-center gap-8">
            <div class="camera-container" id="capture-zone">
                <div id="flash-overlay" class="flash"></div>
                <div id="countdown" class="countdown-overlay">3</div>
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
            </div>

            <div class="flex flex-wrap justify-center gap-4 w-full">
                <button id="start-btn" class="flex items-center gap-2 px-8 py-4 bg-white border-2 border-red-600 text-red-600 font-bold rounded-full hover:bg-red-50 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z"/>
                        <path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z"/>
                    </svg>
                    MULAI SESI (4 FOTO)
                </button>
            </div>

            <!-- Kontrol Filter & Frame -->
            <div class="bg-white p-6 rounded-3xl shadow-sm w-full border border-gray-100">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <span class="w-2 h-6 bg-red-600 rounded-full"></span>
                    PILIH FILTER & FRAME
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="setFilter('none')" class="filter-btn filter-active p-3 border-2 border-gray-100 rounded-xl hover:border-red-200 text-sm font-medium transition-all">Normal</button>
                    <button onclick="setFilter('grayscale(100%)')" class="filter-btn p-3 border-2 border-gray-100 rounded-xl hover:border-red-200 text-sm font-medium transition-all">B&W Classic</button>
                    <button onclick="setFilter('sepia(0.6) contrast(1.1)')" class="filter-btn p-3 border-2 border-gray-100 rounded-xl hover:border-red-200 text-sm font-medium transition-all">Vintage</button>
                    <button onclick="setFilter('brightness(1.1) saturate(1.2)')" class="filter-btn p-3 border-2 border-gray-100 rounded-xl hover:border-red-200 text-sm font-medium transition-all">Vivid</button>
                </div>
                
                <div class="mt-6">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Warna Frame</p>
                    <div class="flex gap-3">
                        <div onclick="setFrameColor('#ffffff')" class="w-8 h-8 rounded-full border-2 border-gray-200 bg-white cursor-pointer hover:scale-110 transition-transform"></div>
                        <div onclick="setFrameColor('#e63946')" class="w-8 h-8 rounded-full border-2 border-gray-200 bg-red-600 cursor-pointer hover:scale-110 transition-transform"></div>
                        <div onclick="setFrameColor('#1a1a1a')" class="w-8 h-8 rounded-full border-2 border-gray-200 bg-black cursor-pointer hover:scale-110 transition-transform"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Area Hasil -->
        <div class="lg:col-span-5 flex flex-col items-center">
            <div class="w-full bg-white p-8 rounded-3xl shadow-xl border border-gray-100 sticky top-8">
                <div id="capture-status" class="mb-4 text-center">
                    <span class="inline-block px-4 py-1 bg-red-50 text-red-600 rounded-full text-xs font-bold">HASIL TERBARU</span>
                </div>
                
                <div id="photo-strip" class="strip-preview">
                    <!-- Foto akan muncul di sini -->
                    <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 1</div>
                    <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 2</div>
                    <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 3</div>
                    <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 4</div>
                    <div class="text-center mt-2">
                        <p class="text-[10px] font-bold text-red-600 tracking-tighter">GLOWSNAP STUDIO • 2024</p>
                    </div>
                </div>

                <div class="mt-8 flex flex-col gap-3">
                    <button id="download-btn" disabled class="w-full py-4 bg-gray-200 text-gray-500 font-bold rounded-2xl cursor-not-allowed transition-all flex justify-center items-center gap-2">
                        UNDUH FOTO (JPG)
                    </button>
                    <button onclick="resetPhotos()" class="w-full py-3 text-red-600 font-semibold hover:bg-red-50 rounded-2xl transition-all">
                        Hapus Semua
                    </button>
                </div>
            </div>
        </div>

    </main>

    <footer class="py-12 text-center text-gray-400 text-sm">
        <p>© 2024 GlowSnap Virtual Photobox. Dibuat dengan semangat Merah Putih.</p>
    </footer>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoStrip = document.getElementById('photo-strip');
        const startBtn = document.getElementById('start-btn');
        const downloadBtn = document.getElementById('download-btn');
        const countdownOverlay = document.getElementById('countdown');
        const flashOverlay = document.getElementById('flash-overlay');

        let capturedPhotos = [];
        let currentFilter = 'none';
        let currentFrameColor = '#ffffff';

        // Akses Kamera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("Gagal akses kamera:", err);
                alert("Mohon izinkan akses kamera untuk menggunakan photobox ini.");
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            video.style.filter = filter;
            
            // Update UI filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('filter-active');
                if(btn.innerText.toLowerCase().includes(filter === 'none' ? 'normal' : '')) {
                    // Just simple highlight for demo
                }
            });
            event.target.classList.add('filter-active');
        }

        function setFrameColor(color) {
            currentFrameColor = color;
            photoStrip.style.backgroundColor = color;
            if (color === '#1a1a1a') {
                photoStrip.querySelector('p').classList.replace('text-red-600', 'text-white');
            } else {
                photoStrip.querySelector('p').classList.replace('text-white', 'text-red-600');
            }
        }

        function takePhoto() {
            return new Promise((resolve) => {
                let count = 3;
                countdownOverlay.style.display = 'block';
                countdownOverlay.innerText = count;

                const timer = setInterval(() => {
                    count--;
                    if (count > 0) {
                        countdownOverlay.innerText = count;
                    } else {
                        clearInterval(timer);
                        countdownOverlay.style.display = 'none';
                        
                        // Flash Effect
                        flashOverlay.classList.add('animate-flash');
                        setTimeout(() => flashOverlay.classList.remove('animate-flash'), 500);

                        // Capture
                        const context = canvas.getContext('2d');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        
                        // Mirror if user cam
                        context.translate(canvas.width, 0);
                        context.scale(-1, 1);
                        
                        context.filter = currentFilter;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const data = canvas.toDataURL('image/jpeg');
                        resolve(data);
                    }
                }, 800);
            });
        }

        async function startSession() {
            capturedPhotos = [];
            startBtn.disabled = true;
            startBtn.innerText = "SEDANG MENGAMBIL FOTO...";
            startBtn.classList.replace('bg-white', 'bg-gray-100');
            startBtn.classList.replace('text-red-600', 'text-gray-400');

            // Render placeholders
            photoStrip.innerHTML = '';
            for(let i=0; i<4; i++) {
                const div = document.createElement('div');
                div.className = "strip-photo flex items-center justify-center bg-gray-100 text-gray-400 animate-pulse";
                div.innerText = "Menunggu...";
                photoStrip.appendChild(div);
            }

            for (let i = 0; i < 4; i++) {
                const photoData = await takePhoto();
                capturedPhotos.push(photoData);
                renderStrip();
            }

            // Footer branding back
            const footerBranding = document.createElement('div');
            footerBranding.className = "text-center mt-2";
            footerBranding.innerHTML = `<p class="text-[10px] font-bold ${currentFrameColor === '#1a1a1a' ? 'text-white' : 'text-red-600'} tracking-tighter uppercase">GLOWSNAP STUDIO • MERAH PUTIH EDITION</p>`;
            photoStrip.appendChild(footerBranding);

            startBtn.disabled = false;
            startBtn.innerText = "MULAI SESI LAGI";
            startBtn.classList.replace('bg-gray-100', 'bg-white');
            startBtn.classList.replace('text-gray-400', 'text-red-600');

            downloadBtn.disabled = false;
            downloadBtn.classList.replace('bg-gray-200', 'bg-red-600');
            downloadBtn.classList.replace('text-gray-500', 'text-white');
            downloadBtn.classList.add('hover:bg-red-700', 'cursor-pointer');
        }

        function renderStrip() {
            photoStrip.innerHTML = '';
            capturedPhotos.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "strip-photo shadow-sm";
                photoStrip.appendChild(img);
            });
            // Add remaining placeholders
            for(let i=capturedPhotos.length; i<4; i++) {
                const div = document.createElement('div');
                div.className = "strip-photo flex items-center justify-center bg-gray-100 text-gray-400";
                div.innerText = `Foto ${i+1}`;
                photoStrip.appendChild(div);
            }
        }

        function resetPhotos() {
            capturedPhotos = [];
            photoStrip.innerHTML = `
                <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 1</div>
                <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 2</div>
                <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 3</div>
                <div class="strip-photo flex items-center justify-center text-gray-300 italic text-sm text-center px-4">Foto 4</div>
                <div class="text-center mt-2">
                    <p class="text-[10px] font-bold text-red-600 tracking-tighter">GLOWSNAP STUDIO • 2024</p>
                </div>
            `;
            downloadBtn.disabled = true;
            downloadBtn.className = "w-full py-4 bg-gray-200 text-gray-500 font-bold rounded-2xl cursor-not-allowed transition-all flex justify-center items-center gap-2";
        }

        // Fitur Download menggunakan HTML2Canvas-like logic manual
        async function downloadStrip() {
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            
            const photoWidth = 640;
            const photoHeight = 480;
            const padding = 40;
            const gap = 30;
            const footerSpace = 100;

            tempCanvas.width = photoWidth + (padding * 2);
            tempCanvas.height = (photoHeight * 4) + (gap * 3) + (padding * 2) + footerSpace;

            // Background Frame
            ctx.fillStyle = currentFrameColor;
            ctx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

            // Draw each photo
            for (let i = 0; i < capturedPhotos.length; i++) {
                const img = new Image();
                img.src = capturedPhotos[i];
                await new Promise(r => img.onload = r);
                ctx.drawImage(img, padding, padding + (i * (photoHeight + gap)), photoWidth, photoHeight);
            }

            // Text Branding
            ctx.fillStyle = (currentFrameColor === '#1a1a1a') ? '#ffffff' : '#e63946';
            ctx.font = "bold 30px 'Plus Jakarta Sans'";
            ctx.textAlign = "center";
            ctx.fillText("GLOWSNAP VIRTUAL PHOTOBOX", tempCanvas.width / 2, tempCanvas.height - 60);
            ctx.font = "20px 'Plus Jakarta Sans'";
            ctx.fillText("EDISI MERAH PUTIH • 2024", tempCanvas.width / 2, tempCanvas.height - 30);

            // Trigger Download
            const link = document.createElement('a');
            link.download = `glowsnap-${Date.now()}.jpg`;
            link.href = tempCanvas.toDataURL('image/jpeg', 0.9);
            link.click();
        }

        startBtn.addEventListener('click', startSession);
        downloadBtn.addEventListener('click', downloadStrip);

        // Run
        window.onload = initCamera;
    </script>
</body>
</html>
